<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrackPath — Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-glow"></div>
  </div>

  <div class="auth-container">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon"></div>
      <span class="logo-text">
        <span class="track">Track</span><span class="path">Path</span>
      </span>
    </div>

    <p class="auth-tagline">Your AI-powered learning roadmap</p>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Sign in</button>
        <button class="auth-tab" id="tab-signup">Create account</button>
      </div>

      <!-- Error message -->
      <div class="auth-error" id="auth-error"></div>

      <!-- Email/Password Form -->
      <div class="auth-form" id="auth-form">
        <input
          type="email"
          id="auth-email"
          class="auth-input"
          placeholder="Email address"
          autocomplete="email"
        />
        <input
          type="password"
          id="auth-password"
          class="auth-input"
          placeholder="Password"
          autocomplete="current-password"
        />
        <input
          type="text"
          id="auth-name"
          class="auth-input"
          placeholder="Your name"
          style="display:none"
        />
        <button class="btn-primary auth-btn" id="btn-email-auth">
          Sign in
        </button>
      </div>

      <div class="auth-divider"><span>or</span></div>

      <!-- Google Login -->
      <button class="btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
          <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
          <path fill="#FBBC05" d="M4.5 10.48A4.8 4.8 0 0 1 4.5 7.5V5.43H1.83a8 8 0 0 0 0 7.12z"/>
          <path fill="#EA4335" d="M8.98 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59A8 8 0 0 0 1.83 5.43L4.5 7.5a4.77 4.77 0 0 1 4.48-3.92z"/>
        </svg>
        Continue with Google
      </button>

    </div>

    <p class="auth-footer">
      By continuing, you agree to TrackPath's terms of service
    </p>

  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
